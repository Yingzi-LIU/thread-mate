<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Threadmate</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="brand-mark"></div>
        <div>
          <h1>Threadmate</h1>
          <p>Your research thread companion</p>
        </div>
      </header>

      <label for="goal">Current task</label>
      <textarea id="goal" rows="3" placeholder="What are you trying to complete in the browser?"></textarea>

      <fieldset class="tone-picker">
        <legend>How should I nudge you when the thread drifts?</legend>
        <label class="tone-card">
          <input type="radio" name="tone" value="friend" checked />
          <span>
            <strong>Like a friend</strong>
            <em>Light, funny, and not too serious.</em>
          </span>
        </label>
        <label class="tone-card">
          <input type="radio" name="tone" value="strict" />
          <span>
            <strong>Strict coach</strong>
            <em>Clear, direct, and a little no-nonsense.</em>
          </span>
        </label>
        <label class="tone-card">
          <input type="radio" name="tone" value="partner" />
          <span>
            <strong>Gentle partner</strong>
            <em>Warm, caring, and softly protective.</em>
          </span>
        </label>
      </fieldset>

      <div class="actions">
        <button id="start">Start Session</button>
        <button id="end" class="secondary">End</button>
      </div>

      <button id="import-tabs" class="wide secondary">Send New Tabs to App</button>

      <section class="status">
        <span id="state-dot"></span>
        <span id="state-text">No active session</span>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
